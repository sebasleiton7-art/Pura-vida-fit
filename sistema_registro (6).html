<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Registro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --red: #E01020;
    --red-dark: #A00010;
    --black: #0A0A0A;
    --dark: #141414;
    --card: #1C1C1C;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #888;
    --input-bg: #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    border-bottom: 2px solid var(--red);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header img { height: 52px; width: 52px; object-fit: contain; }
  .header-text h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
  }
  .header-text p {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .back-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .back-btn.show { display: flex; }
  .back-btn:hover { border-color: var(--red); color: white; }

  main { padding: 32px; max-width: 900px; margin: 0 auto; }

  /* COMPANY SELECT SCREEN */
  #company-screen { text-align: center; padding-top: 40px; }
  #company-screen h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 8px;
    color: white;
  }
  #company-screen > p { color: var(--muted); font-size: 14px; margin-bottom: 40px; }

  .company-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 700px;
    margin: 0 auto;
  }
  .company-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 20px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .company-card:hover {
    border-color: var(--red);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(224,16,32,0.2);
  }
  .company-card img {
    width: 100%;
    max-width: 220px;
    height: auto;
    margin-bottom: 16px;
  }
  .company-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: white;
    margin-bottom: 4px;
  }
  .company-card p { font-size: 12px; color: var(--muted); }

  @media (max-width: 600px) {
    .company-grid { grid-template-columns: 1fr; }
  }

  /* MENU */
  #menu-screen { display: none; }
  #menu-screen h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    color: white;
  }
  #menu-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .menu-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .menu-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .menu-card:hover { border-color: var(--red); transform: translateY(-2px); background: #222; }
  .menu-card:hover::before { transform: scaleX(1); }
  .menu-card .icon { font-size: 36px; margin-bottom: 12px; }
  .menu-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: white;
    margin-bottom: 6px;
  }
  .menu-card p { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* FORM SCREEN */
  #form-screen { display: none; }
  .form-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
    color: white;
  }
  .form-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .form-grid .full { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field label span.req { color: var(--red); }
  .field label span.auto {
    color: #444;
    font-size: 10px;
    background: #222;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
    appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--red);
  }
  .field input.auto-filled {
    color: #666;
    font-style: italic;
    background: #1a1a1a;
  }
  .field select option { background: #1C1C1C; }

  .id-preview {
    background: #1a1a1a;
    border: 1px dashed #333;
    border-radius: 8px;
    padding: 11px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--red);
    letter-spacing: 1px;
    min-height: 44px;
  }
  .id-preview.empty { color: #333; font-style: italic; font-size: 13px; font-family: 'Inter'; font-weight: 400; }

  /* CURRENCY TOGGLE */
  .currency-toggle {
    display: flex;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .currency-btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .currency-btn.active {
    background: var(--red);
    color: white;
  }
  .exchange-rate-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: -16px;
    margin-bottom: 20px;
  }
  .converted-amount {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    font-style: italic;
  }

  .btn-submit {
    background: var(--red);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
  }
  .btn-submit:hover { background: var(--red-dark); transform: translateY(-1px); }
  .btn-submit:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: #1C1C1C;
    border-left: 4px solid var(--red);
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: #22C55E; }
  .toast.error { border-color: var(--red); }
  .toast-title { font-weight: 600; margin-bottom: 4px; }
  .toast-msg { color: var(--muted); font-size: 13px; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    main { padding: 20px 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .menu-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header id="appHeader" style="display:none;">
  <img id="headerLogo" src="" alt="Logo">
  <div class="header-text">
    <h1 id="headerTitle"></h1>
    <p id="headerSubtitle"></p>
  </div>
  <button class="back-btn" id="backBtn" onclick="goBack()">← Atrás</button>
</header>

<main>
  <!-- COMPANY SELECT -->
  <div id="company-screen">
    <h2>Sistema de Registro</h2>
    <p>Seleccioná la empresa con la que querés trabajar</p>
    <div class="company-grid">
      <div class="company-card" onclick="selectCompany('autologistics')">
        <img src="logo_auto.png" alt="Auto Logistics">
        <h3>Auto Logistics</h3>
        <p>Importación y venta de vehículos</p>
      </div>
      <div class="company-card" onclick="selectCompany('alfa')">
        <img src="logo_alfa.png" alt="Alfa SR">
        <h3>Alfa SR</h3>
        <p>Proyectos inmobiliarios e inversión</p>
      </div>
    </div>
  </div>

  <!-- MENU -->
  <div id="menu-screen">
    <h2 id="menuTitle">Sistema de Registro</h2>
    <p id="menuSubtitle">Seleccioná qué querés registrar hoy</p>
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- FORM -->
  <div id="form-screen">
    <div class="form-title" id="formTitle"></div>
    <div class="form-subtitle" id="formSubtitle"></div>
    <div id="formFields"></div>
  </div>
</main>

<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-msg" id="toastMsg"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SHEET_ID = '1C-m6zy9reuusvmDypzTY8j-OWr4pGfnY6odhO354hjE';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySrDY74eM-NzoERgFBnIayafVleBTz79SXcAVUqj4S2ix2H_mBiiPEwTMDUlriAoEb9g/exec';

const SHEETS = {
  vehiculos: 'Vehículos',
  costos: 'Costos Importación',
  gastos: 'Gastos Vehículo',
  ventas: 'Ventas',
  pagos: 'Pagos y Abonos',
  proyectos: 'Proyectos',
  gastosProyecto: 'Gastos Proyecto'
};

const PERSONAS = ['Miguel','Alex','Marco','Luciana','Priscila','Empresa','Kennett','Mata','Otro'];
const PERSONA_INITIALS = {
  'Miguel':'MI','Alex':'AL','Marco':'MA','Luciana':'LU',
  'Priscila':'PR','Empresa':'EM','Kennett':'KE','Mata':'MT','Otro':'OT'
};
const MARCAS_MAP = {
  'Toyota':'TO','Honda':'HO','Hyundai':'HI','BMW':'BM','Mercedes':'ME',
  'Range Rover':'RA','Kia':'KI','Nissan':'NI','Ford':'FO','Chevrolet':'CH',
  'Volkswagen':'VW','Audi':'AU','Mazda':'MA','Subaru':'SU','Jeep':'JE','Ram':'RM'
};
const MARCAS = Object.keys(MARCAS_MAP).concat(['Otro']);

const TIPOS_VEHICULO = ['Carro', 'Moto', 'Jet Ski', 'Mula'];

const MARCAS_POR_TIPO = {
  'Carro': ['Toyota','Honda','Hyundai','BMW','Mercedes','Range Rover','Kia','Nissan','Ford','Chevrolet','Volkswagen','Audi','Mazda','Subaru','Jeep','Ram','Otro'],
  'Moto': ['Ducati','Honda','Yamaha','Kawasaki','Suzuki','Harley-Davidson','KTM','BMW','Triumph','Royal Enfield','Otro'],
  'Jet Ski': ['Sea-Doo','Yamaha','Kawasaki','Honda','Otro'],
  'Mula': ['Polaris','Kawasaki','Yamaha','Can-Am','John Deere','Kubota','Otro']
};

const MARCAS_MAP_MOTO = {
  'Ducati':'DU','Honda':'HO','Yamaha':'YA','Kawasaki':'KA','Suzuki':'SU',
  'Harley-Davidson':'HD','KTM':'KT','BMW':'BM','Triumph':'TR','Royal Enfield':'RE','Otro':'OT'
};
const MARCAS_MAP_JETSKI = {'Sea-Doo':'SD','Yamaha':'YA','Kawasaki':'KA','Honda':'HO','Otro':'OT'};
const MARCAS_MAP_MULA = {'Polaris':'PO','Kawasaki':'KA','Yamaha':'YA','Can-Am':'CA','John Deere':'JD','Kubota':'KU','Otro':'OT'};

function getMarcaCode(tipoVehiculo, marca) {
  if(tipoVehiculo === 'Moto') return MARCAS_MAP_MOTO[marca] || marca.substring(0,2).toUpperCase();
  if(tipoVehiculo === 'Jet Ski') return MARCAS_MAP_JETSKI[marca] || marca.substring(0,2).toUpperCase();
  if(tipoVehiculo === 'Mula') return MARCAS_MAP_MULA[marca] || marca.substring(0,2).toUpperCase();
  return MARCAS_MAP[marca] || marca.substring(0,2).toUpperCase();
}

const CATEGORIAS_GASTO = [
  'Mecánica y Motor','Carrocería y Pintura','Estética y Detallado',
  'Trámites y Documentos','Eléctrico y Electrónico',
  'Llantas y Frenos','Transporte y Logística','Otros'
];
const ESTADOS = ['Disponible','Vendido','En Proceso','En Reparación','Reservado'];
const TIPOS = ['Sedán','SUV','Pickup','Hatchback','Coupé','Convertible','Van','Camión'];
const TRANSMISIONES = ['Automática','Manual'];
const FORMAS_PAGO = ['Contado','Financiado','Mixto'];
const METODOS_PAGO = ['Efectivo','Transferencia','Cheque','Depósito','Otro'];

const TIPOS_PROYECTO = ['Inmobiliario','Inversión','Préstamo','Desarrollo','Otro'];
const ESTADOS_PROYECTO = ['En Proceso','Activo','Finalizado','Pausado'];
const CATEGORIAS_GASTO_PROYECTO = ['Construcción','Materiales','Mano de Obra','Permisos y Trámites','Diseño y Planos','Legal','Otros'];

let vehiculosData = [];
let proyectosData = [];
let currentForm = null;
let currentCompany = null;
let exchangeRate = 460; // fallback
let currentCurrency = 'USD'; // selected currency for the active form

// ============================================================
// EXCHANGE RATE
// ============================================================
async function fetchExchangeRate() {
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await res.json();
    if(data && data.rates && data.rates.CRC) {
      exchangeRate = data.rates.CRC;
      return exchangeRate;
    }
  } catch(e) {
    console.log('Using fallback exchange rate');
  }
  return exchangeRate;
}

// ============================================================
// SHEETS API (via Apps Script)
// ============================================================
async function sheetsGet(range) {
  const url = `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(range)}`;
  const res = await fetch(url);
  return res.json();
}

async function sheetsAppend(sheetName, values) {
  const payload = JSON.stringify({action:'append', sheet: sheetName, values: values});
  const formData = new FormData();
  formData.append('payload', payload);
  const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
  return res.json();
}

async function sheetsUpdate(range, values) {
  const payload = JSON.stringify({action:'update', range: range, values: values});
  const formData = new FormData();
  formData.append('payload', payload);
  const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
  return res.json();
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadVehiculos() {
  try {
    const data = await sheetsGet(SHEETS.vehiculos + '!A2:O200');
    vehiculosData = (data.values || []).filter(r => r[0] && r[0] !== 'ID_Vehículo');
  } catch(e) { vehiculosData = []; }
}

async function loadProyectos() {
  try {
    const data = await sheetsGet(SHEETS.proyectos + '!A2:I200');
    proyectosData = (data.values || []).filter(r => r[0] && r[0] !== 'ID_Proyecto');
  } catch(e) { proyectosData = []; }
}

function getVehicleLabel(row) {
  // row: [ID, Persona, Fecha, VIN, TipoVehiculo, Marca, Modelo, Año, Color, Trans, KM, Pais, Estado, Notas]
  const marca = row[5] || '';
  const modelo = row[6] || '';
  const año = row[7] || '';
  const color = row[8] || '';
  const persona = row[1] || '';
  return `${marca} ${modelo} ${año} - ${color} - ${persona}`;
}

function getProjectLabel(row) {
  const nombre = row[1] || '';
  const tipo = row[2] || '';
  return `${nombre} (${tipo})`;
}

// ============================================================
// ID GENERATION
// ============================================================
function generateVehicleID(persona, fecha, marca, tipoVehiculo) {
  if(!persona || !fecha || !marca) return null;
  const p = PERSONA_INITIALS[persona] || persona.substring(0,2).toUpperCase();
  const d = fecha.replace(/-/g,'');
  const m = getMarcaCode(tipoVehiculo || 'Carro', marca);
  return `${p}-${d}-${m}`;
}

function generateProjectID(nombre, fecha) {
  if(!nombre || !fecha) return null;
  const n = nombre.substring(0,3).toUpperCase().replace(/[^A-Z]/g,'');
  const d = fecha.replace(/-/g,'');
  return `${n}-${d}`;
}

// ============================================================
// NAVIGATION
// ============================================================
function selectCompany(company) {
  currentCompany = company;
  document.getElementById('company-screen').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';

  if(company === 'autologistics') {
    // logo set below
    document.getElementById('headerTitle').textContent = 'AUTO LOGISTICS';
    document.getElementById('headerSubtitle').textContent = 'Importación y Venta de Vehículos';
  } else {
    // logo set below
    document.getElementById('headerTitle').textContent = 'ALFA SR';
    document.getElementById('headerSubtitle').textContent = 'Proyectos Inmobiliarios e Inversión';
  }

  showMenu();
}

function goBack() {
  if(document.getElementById('form-screen').style.display === 'block') {
    showMenu();
  } else {
    // back to company select
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('appHeader').style.display = 'none';
    document.getElementById('backBtn').classList.remove('show');
    document.getElementById('company-screen').style.display = 'block';
    currentCompany = null;
  }
}

function showMenu() {
  document.getElementById('menu-screen').style.display = 'block';
  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('backBtn').classList.add('show');
  currentForm = null;

  const grid = document.getElementById('menuGrid');
  if(currentCompany === 'autologistics') {
    document.getElementById('menuTitle').textContent = 'Auto Logistics';
    document.getElementById('menuSubtitle').textContent = 'Seleccioná qué querés registrar hoy';
    grid.innerHTML = `
      <div class="menu-card" onclick="showForm('vehiculo')">
        <div class="icon">🚗</div>
        <h3>Vehículo</h3>
        <p>Registrar un nuevo vehículo al inventario</p>
      </div>
      <div class="menu-card" onclick="showForm('costo')">
        <div class="icon">💰</div>
        <h3>Costo de Importación</h3>
        <p>Registrar costos de importación de un vehículo</p>
      </div>
      <div class="menu-card" onclick="showForm('gasto')">
        <div class="icon">🔧</div>
        <h3>Gasto</h3>
        <p>Registrar un gasto asociado a un vehículo</p>
      </div>
      <div class="menu-card" onclick="showForm('venta')">
        <div class="icon">🤝</div>
        <h3>Venta</h3>
        <p>Registrar la venta de un vehículo disponible</p>
      </div>
      <div class="menu-card" onclick="showForm('pago')">
        <div class="icon">💳</div>
        <h3>Pago / Abono</h3>
        <p>Registrar un abono de vehículo financiado</p>
      </div>
    `;
  } else {
    document.getElementById('menuTitle').textContent = 'Alfa SR';
    document.getElementById('menuSubtitle').textContent = 'Seleccioná qué querés registrar hoy';
    grid.innerHTML = `
      <div class="menu-card" onclick="showForm('proyecto')">
        <div class="icon">🏗️</div>
        <h3>Proyecto</h3>
        <p>Registrar un nuevo proyecto</p>
      </div>
      <div class="menu-card" onclick="showForm('gastoProyecto')">
        <div class="icon">📋</div>
        <h3>Gasto de Proyecto</h3>
        <p>Registrar un gasto asociado a un proyecto</p>
      </div>
    `;
  }
}

async function showForm(type) {
  currentForm = type;
  currentCurrency = 'USD';
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('backBtn').classList.add('show');

  await fetchExchangeRate();

  if(type === 'vehiculo' || type === 'costo' || type === 'gasto' || type === 'venta' || type === 'pago') {
    await loadVehiculos();
  }
  if(type === 'proyecto' || type === 'gastoProyecto') {
    await loadProyectos();
  }

  await renderForm(type);
}

// ============================================================
// CURRENCY HELPERS
// ============================================================
function currencyToggleHTML(idPrefix) {
  return `
  <div class="currency-toggle" id="${idPrefix}_currencyToggle">
    <div class="currency-btn active" data-currency="USD" onclick="setCurrency('${idPrefix}','USD')">Dólares (USD)</div>
    <div class="currency-btn" data-currency="CRC" onclick="setCurrency('${idPrefix}','CRC')">Colones (₡)</div>
  </div>
  <div class="exchange-rate-note">Tipo de cambio: ₡${exchangeRate.toFixed(2)} por $1 USD</div>
  `;
}

function setCurrency(idPrefix, currency) {
  currentCurrency = currency;
  const toggle = document.getElementById(`${idPrefix}_currencyToggle`);
  toggle.querySelectorAll('.currency-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.currency === currency);
  });
  // Update all money field labels/placeholders dynamically
  document.querySelectorAll('.money-field').forEach(input => {
    input.placeholder = currency === 'USD' ? '0.00 USD' : '0.00 ₡';
  });
}

function convertAmount(value, fromCurrency) {
  const v = parseFloat(value) || 0;
  if(fromCurrency === 'USD') {
    return { usd: v, crc: v * exchangeRate };
  } else {
    return { usd: v / exchangeRate, crc: v };
  }
}

function moneyField(label, id, req=true) {
  const reqSpan = req ? '<span class="req">*</span>' : '';
  return `<div class="field">
    <label>${label} ${reqSpan}</label>
    <input type="number" id="${id}" class="money-field" placeholder="0.00 USD" step="0.01">
  </div>`;
}

function field(label, inputHtml, req=true, auto=false, fullWidth=false) {
  const reqSpan = req ? '<span class="req">*</span>' : '';
  const autoSpan = auto ? '<span class="auto">AUTO</span>' : '';
  return `<div class="field${fullWidth?' full':''}">
    <label>${label} ${reqSpan}${autoSpan}</label>
    ${inputHtml}
  </div>`;
}

function selectOptions(opts, placeholder='Seleccioná...') {
  return `<option value="">— ${placeholder} —</option>` + opts.map(o => `<option value="${o}">${o}</option>`).join('');
}

function vehicleOptions(filter) {
  const filtered = vehiculosData.filter(filter);
  if(filtered.length === 0) return '<option value="">— No hay vehículos disponibles —</option>';
  return '<option value="">— Seleccioná un vehículo —</option>' +
    filtered.map((r,i) => `<option value="${i}">${getVehicleLabel(r)}</option>`).join('');
}

function projectOptions(filter) {
  const filtered = filter ? proyectosData.filter(filter) : proyectosData;
  if(filtered.length === 0) return '<option value="">— No hay proyectos —</option>';
  return '<option value="">— Seleccioná un proyecto —</option>' +
    filtered.map((r,i) => `<option value="${i}">${getProjectLabel(r)}</option>`).join('');
}

async function submitVehiculo() {
  const persona = document.getElementById('f_persona').value;
  const fecha = document.getElementById('f_fecha').value;
  const vin = document.getElementById('f_vin').value;
  const tipo_vehiculo = document.getElementById('f_tipo_vehiculo').value;
  const marca = document.getElementById('f_marca').value;
  const modelo = document.getElementById('f_modelo').value;
  const año = document.getElementById('f_año').value;
  const color = document.getElementById('f_color').value;
  const tipo = document.getElementById('f_tipo').value;
  const trans = document.getElementById('f_trans').value;
  const km = document.getElementById('f_km').value;
  const pais = document.getElementById('f_pais').value;
  const estado = document.getElementById('f_estado').value;
  const notas = document.getElementById('f_notas').value;

  if(!persona||!fecha||!vin||!tipo_vehiculo||!marca||!modelo||!año||!color||!tipo||!trans||!estado) {
    return showToast('error','Campos incompletos','Completá todos los campos requeridos.');
  }

  const id = generateVehicleID(persona, fecha, marca, tipo_vehiculo);
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';

  try {
    await sheetsAppend(SHEETS.vehiculos, [
      id, persona, fecha, vin, tipo_vehiculo, marca, modelo, año, color, tipo, trans, km||'', pais||'EE.UU.', estado, notas||''
    ]);
    showToast('success','¡Vehículo guardado!', `${marca} ${modelo} ${año} registrado con ID: ${id}`);
    setTimeout(showMenu, 2000);
  } catch(e) {
    showToast('error','Error al guardar','Verificá tu conexión e intentá de nuevo.');
    btn.disabled = false;
    btn.innerHTML = 'GUARDAR VEHÍCULO';
  }
}

async function submitCosto() {
  const idx = document.getElementById('f_vehiculo').value;
  if(idx === '') return showToast('error','Seleccioná un vehículo','');
  const row = vehiculosData[parseInt(idx)];
  const id = row[0]; const vin = row[3]; const marca = row[5]; const modelo = row[6]; const año = row[7];

  const fields = ['f_precio_usa','f_flete','f_seguro','f_impuesto','f_arancel','f_iva','f_aduana'];
  const vals = fields.map(id => document.getElementById(id).value);
  const otros = document.getElementById('f_otros').value || '0';

  if(vals.some(v => !v)) {
    return showToast('error','Campos incompletos','Completá todos los campos requeridos.');
  }

  // Convert each amount to USD/CRC pair
  const conv = [...vals, otros].map(v => convertAmount(v, currentCurrency));
  const totalUSD = conv.reduce((a,c) => a + c.usd, 0);
  const totalCRC = totalUSD * exchangeRate;

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Guardando...';

  try {
    // Order: ID VIN TipoVeh Marca Modelo Año | Precio(USD,CRC) Flete(USD,CRC) Seguro(USD,CRC) Impuesto(USD,CRC) Arancel(USD,CRC) IVA(USD,CRC) Aduana(USD,CRC) Otros(USD,CRC) | TotalUSD TipoCambio TotalLocal
    const row = vehiculosData[parseInt(idx)];
    const tipoVeh = row[4];
    const values = [id, vin, tipoVeh, marca, modelo, año];
    conv.forEach(c => { values.push(c.usd.toFixed(2)); values.push(c.crc.toFixed(2)); });
    values.push(totalUSD.toFixed(2));
    values.push(exchangeRate.toFixed(2));
    values.push(totalCRC.toFixed(2));

    await sheetsAppend(SHEETS.costos, values);

    showToast('error','Error al guardar','');
    btn.disabled = false; btn.innerHTML = 'GUARDAR COSTO';
  }
}

async function submitVenta() {
  const idx = document.getElementById('f_vehiculo').value;
  if(idx === '') return showToast('error','Seleccioná un vehículo','');
  const row = vehiculosData[parseInt(idx)];
  const id = row[0]; const vin = row[3]; const marca = row[5]; const modelo = row[6]; const año = row[7];

  const fecha = document.getElementById('f_fecha').value;
  const precio = document.getElementById('f_precio').value;
  const forma = document.getElementById('f_forma_pago').value;
  const enganche = document.getElementById('f_enganche').value || precio;
  const cliente = document.getElementById('f_cliente').value;
  const telefono = document.getElementById('f_telefono').value;

  if(!fecha||!precio||!forma||!cliente||!telefono) {
    return showToast('error','Campos incompletos','Completá todos los campos requeridos.');
  }

  const precioConv = convertAmount(precio, currentCurrency);
  const engancheConv = convertAmount(enganche || precio, currentCurrency);
  const saldoUSD = precioConv.usd - engancheConv.usd;
  const saldoCRC = precioConv.crc - engancheConv.crc;

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Guardando...';

  try {
    await sheetsAppend(SHEETS.ventas, [
      id, vin, marca, modelo, año, fecha,
      precioConv.usd.toFixed(2), precioConv.crc.toFixed(2),
      forma,
      engancheConv.usd.toFixed(2), engancheConv.crc.toFixed(2),
      saldoUSD.toFixed(2), saldoCRC.toFixed(2),
      cliente, telefono
    ]);

    const rowIdx = vehiculosData.indexOf(row);
    const sheetRow = rowIdx + 2;
    await sheetsUpdate(`${SHEETS.vehiculos}!N${sheetRow}`, ['Vendido']);

    showToast('success','¡Venta registrada!', `${marca} ${modelo} — ${cliente}`);
    setTimeout(showMenu, 2000);
  } catch(e) {
    showToast('error','Error al guardar','');
    btn.disabled = false; btn.innerHTML = 'GUARDAR VENTA';
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(type, title, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3500);
}
